<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            color: #4ecca3;
            margin-bottom: 20px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .score-board {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
        }

        .score-item {
            background: rgba(78, 204, 163, 0.1);
            padding: 10px 25px;
            border-radius: 10px;
            border: 2px solid #4ecca3;
        }

        .score-item span {
            color: #fff;
            font-size: 1rem;
        }

        .score-item .value {
            color: #4ecca3;
            font-size: 1.5rem;
            font-weight: bold;
            margin-left: 10px;
        }

        #gameCanvas {
            border: 4px solid #4ecca3;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(78, 204, 163, 0.3);
            background: #0f0f23;
        }

        .controls {
            margin-top: 20px;
            color: #888;
            font-size: 0.9rem;
        }

        .controls p {
            margin: 5px 0;
        }

        .btn {
            background: linear-gradient(135deg, #4ecca3 0%, #38a169 100%);
            color: #1a1a2e;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(78, 204, 163, 0.4);
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(26, 26, 46, 0.95);
            padding: 40px 60px;
            border-radius: 15px;
            border: 3px solid #e74c3c;
            display: none;
            z-index: 10;
        }

        .game-over h2 {
            color: #e74c3c;
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .game-over p {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        /* 移动端控制按钮 */
        .mobile-controls {
            display: none;
            margin-top: 20px;
        }

        .mobile-btn {
            width: 60px;
            height: 60px;
            background: rgba(78, 204, 163, 0.2);
            border: 2px solid #4ecca3;
            border-radius: 10px;
            color: #4ecca3;
            font-size: 1.5rem;
            cursor: pointer;
            margin: 5px;
        }

        .mobile-btn:active {
            background: rgba(78, 204, 163, 0.5);
        }

        .mobile-row {
            display: flex;
            justify-content: center;
        }

        @media (max-width: 500px) {
            .mobile-controls {
                display: block;
            }

            h1 {
                font-size: 1.8rem;
            }

            .score-board {
                gap: 20px;
            }

            .score-item {
                padding: 8px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 贪吃蛇</h1>

        <div class="score-board">
            <div class="score-item">
                <span>当前分数:</span>
                <span class="value" id="score">0</span>
            </div>
            <div class="score-item">
                <span>最高分:</span>
                <span class="value" id="highScore">0</span>
            </div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="controls">
            <p>使用 <strong>↑ ↓ ← →</strong> 或 <strong>W A S D</strong> 控制方向</p>
            <p>按 <strong>空格键</strong> 暂停/继续</p>
        </div>

        <button class="btn" id="startBtn">开始游戏</button>

        <div class="mobile-controls">
            <div class="mobile-row">
                <button class="mobile-btn" id="upBtn">↑</button>
            </div>
            <div class="mobile-row">
                <button class="mobile-btn" id="leftBtn">←</button>
                <button class="mobile-btn" id="downBtn">↓</button>
                <button class="mobile-btn" id="rightBtn">→</button>
            </div>
        </div>

        <div class="game-over" id="gameOver">
            <h2>游戏结束!</h2>
            <p>你的得分: <span id="finalScore">0</span></p>
            <button class="btn" id="restartBtn">重新开始</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        // 游戏配置
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        // 游戏状态
        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let gameSpeed = 100;
        let isRunning = false;
        let isPaused = false;

        // 初始化显示最高分
        highScoreEl.textContent = highScore;

        // 初始化蛇
        function initSnake() {
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
        }

        // 生成食物
        function spawnFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = '#0f0f23';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格
            ctx.strokeStyle = 'rgba(78, 204, 163, 0.1)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 绘制食物
            ctx.fillStyle = '#e74c3c';
            ctx.shadowColor = '#e74c3c';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;

            // 绘制蛇
            snake.forEach((segment, index) => {
                if (index === 0) {
                    // 蛇头
                    ctx.fillStyle = '#4ecca3';
                    ctx.shadowColor = '#4ecca3';
                    ctx.shadowBlur = 10;
                } else {
                    // 蛇身 - 渐变效果
                    const alpha = 1 - (index / snake.length) * 0.5;
                    ctx.fillStyle = `rgba(78, 204, 163, ${alpha})`;
                    ctx.shadowBlur = 0;
                }

                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
            });
            ctx.shadowBlur = 0;

            // 暂停提示
            if (isPaused) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#4ecca3';
                ctx.font = 'bold 30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('已暂停', canvas.width / 2, canvas.height / 2);
                ctx.font = '16px Arial';
                ctx.fillText('按空格键继续', canvas.width / 2, canvas.height / 2 + 30);
            }
        }

        // 更新游戏状态
        function update() {
            if (isPaused) return;

            // 更新方向
            direction = { ...nextDirection };

            // 移动蛇头
            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // 检查墙壁碰撞
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // 检查自身碰撞
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // 检查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                spawnFood();

                // 加速
                if (gameSpeed > 50) {
                    gameSpeed -= 2;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameStep, gameSpeed);
                }
            } else {
                snake.pop();
            }
        }

        // 游戏循环
        function gameStep() {
            update();
            draw();
        }

        // 游戏结束
        function gameOver() {
            isRunning = false;
            clearInterval(gameLoop);

            // 更新最高分
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreEl.textContent = highScore;
            }

            finalScoreEl.textContent = score;
            gameOverEl.style.display = 'block';
        }

        // 开始游戏
        function startGame() {
            score = 0;
            gameSpeed = 100;
            scoreEl.textContent = score;
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            isPaused = false;

            initSnake();
            spawnFood();

            gameOverEl.style.display = 'none';
            startBtn.textContent = '重新开始';

            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(gameStep, gameSpeed);
            isRunning = true;
            draw();
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!isRunning) return;

            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
                case ' ':
                    e.preventDefault();
                    isPaused = !isPaused;
                    draw();
                    break;
            }
        });

        // 移动端控制
        document.getElementById('upBtn').addEventListener('click', () => {
            if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
        });
        document.getElementById('downBtn').addEventListener('click', () => {
            if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
        });
        document.getElementById('leftBtn').addEventListener('click', () => {
            if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
        });
        document.getElementById('rightBtn').addEventListener('click', () => {
            if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
        });

        // 按钮事件
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        // 初始绘制
        initSnake();
        spawnFood();
        draw();
    </script>
</body>
</html>
